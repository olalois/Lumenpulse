name: Backend CI

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  workflow_dispatch:
  push:
    branches: [ "main" ]
    paths:
      - 'apps/backend/**'
  pull_request:
    branches: [ "main" ]
    paths:
      - 'apps/backend/**'
      - 'apps/backend/.ci-trigger'

jobs:
  backend-checks:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./apps/backend

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20.x'
        cache: 'npm'
        cache-dependency-path: './apps/backend/package-lock.json'

    - name: Install dependencies
      run: npm ci

    - name: Lint
      run: npx eslint "{src,apps,libs,test}/**/*.ts" --max-warnings=0

    - name: Type Check
      # Check if script exists to avoid failure if not set up yet
      run: if npm run | grep -q "type-check"; then npm run type-check; else echo "No type-check script found, skipping"; fi

    - name: Run Tests
      if: env.SKIP_TESTS != 'true'
      run: npm run test

    - name: Build
      run: npm run build
